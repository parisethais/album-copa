<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álbum Copa 2026 - Minhas Figurinhas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3a;
    --accent: #c8ff00;
    --accent2: #ff6b35;
    --repeat-color: #ff6b35;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --missing: #2a2a3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 0 0 80px; }

  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 20px 24px 0;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent); letter-spacing: 2px; line-height: 1; }
  .subtitle { color: var(--muted); font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; }

  .global-stats { display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 12px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; }

  .tabs { display: flex; gap: 0; margin-top: 16px; }
  .tab-btn {
    padding: 10px 24px;
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text); }
  .tab-btn.repeat-tab.active { color: var(--repeat-color); border-bottom-color: var(--repeat-color); }

  .controls {
    padding: 16px 24px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .search-box {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 14px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; flex: 1; min-width: 160px; outline: none; transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  .filter-btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 14px; color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  .content { padding: 20px 24px; }
  .groups-grid { display: grid; gap: 16px; }
  .group-header {
    font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 3px;
    color: var(--muted); text-transform: uppercase; padding: 8px 0 4px;
    border-bottom: 1px solid var(--border); margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .group-progress-text { font-family: 'DM Sans', sans-serif; font-size: 0.75rem; color: var(--muted); letter-spacing: 0; }
  .countries-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(280px, 100%), 1fr)); gap: 12px; }

  .country-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; transition: border-color 0.2s;
    min-width: 0;
  }
  .country-card:hover { border-color: var(--accent); }
  .country-card.complete { border-color: var(--accent); background: rgba(200,255,0,0.03); }
  .country-card.has-repeats { border-color: var(--repeat-color); background: rgba(255,107,53,0.03); }

  .country-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; user-select: none; }
  .country-name { font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .flag { font-size: 1.2rem; line-height: 1; }
  .country-count { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--muted); white-space: nowrap; }
  .country-count.full { color: var(--accent); }
  .country-count.has-r { color: var(--repeat-color); }

  .country-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 10px; overflow: hidden; }
  .country-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; }
  .country-bar-fill.repeat { background: var(--repeat-color); }

  .stickers-grid {
    display: grid;
    grid-template-columns: repeat(10, minmax(0, 1fr));
    gap: 3px;
  }
  .sticker {
    aspect-ratio: 1;
    border-radius: 4px;
    border: 1.5px solid var(--missing);
    background: var(--missing);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(0.4rem, 1.8vw, 0.55rem);
    color: var(--muted);
    font-weight: 600;
    position: relative;
    overflow: hidden;
    min-width: 0;
  }
  .sticker:hover { border-color: var(--accent); transform: scale(1.1); z-index: 2; }
  .sticker.have { background: var(--accent); border-color: var(--accent); color: #000; }
  .sticker.has-repeat { background: var(--repeat-color); border-color: var(--repeat-color); color: #fff; }
  .sticker.has-repeat:hover { border-color: var(--repeat-color); transform: scale(1.05); }

  .repeat-controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    gap: 0;
    overflow: hidden;
  }
  .rep-btn {
    background: none;
    border: none;
    color: inherit;
    font-size: clamp(0.5rem, 1.8vw, 0.7rem);
    cursor: pointer;
    padding: 0;
    line-height: 1;
    font-weight: 900;
    width: 100%;
    text-align: center;
    flex-shrink: 0;
  }
  .rep-count {
    font-size: clamp(0.5rem, 1.8vw, 0.65rem);
    font-weight: 700;
    line-height: 1;
    flex-shrink: 0;
  }

  .sticker-labels {
    display: grid;
    grid-template-columns: repeat(10, minmax(0, 1fr));
    gap: 3px;
    margin-top: 3px;
    margin-bottom: 8px;
  }
  .sticker-label {
    font-size: clamp(0.35rem, 1.2vw, 0.45rem);
    color: var(--muted);
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.2;
  }

  .repeat-summary { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .rep-tag {
    background: rgba(255,107,53,0.15); border: 1px solid var(--repeat-color);
    border-radius: 6px; padding: 3px 8px; font-size: 0.75rem; color: var(--repeat-color);
    font-weight: 600;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .legend { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.7rem; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state p { font-size: 0.9rem; margin-top: 8px; }

  .rep-total { color: var(--repeat-color); font-size: 0.75rem; margin-left: 4px; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>&#x26BD; Copa 2026</h1>
    <span class="subtitle">Meu Album</span>
  </div>
  <div class="global-stats">
    <div class="stat">
      <span class="stat-num" id="total-have">0</span>
      <span class="stat-label">figurinhas</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="total-missing">-</span>
      <span class="stat-label">faltando</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="total-pct">0%</span>
      <span class="stat-label">completo</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="countries-done">0</span>
      <span class="stat-label">paises completos</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="total-repeats" style="color:var(--repeat-color)">0</span>
      <span class="stat-label">repetidas</span>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="global-bar" style="width:0%"></div></div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="album">Album</button>
    <button class="tab-btn repeat-tab" data-tab="repeats">Repetidas <span class="rep-total" id="rep-total-badge"></span></button>
  </div>
</header>

<div id="controls-album" class="controls">
  <input class="search-box" type="text" placeholder="Buscar pais..." id="search-input">
  <button class="filter-btn active" data-filter="all">Todos</button>
  <button class="filter-btn" data-filter="incomplete">Incompletos</button>
  <button class="filter-btn" data-filter="started">Iniciados</button>
  <button class="filter-btn" data-filter="complete">Completos</button>
  <button class="filter-btn" id="backup-btn" style="margin-left:auto; border-color:var(--accent); color:var(--accent)">Backup</button>
  <button class="filter-btn" id="restore-btn" style="border-color:var(--accent); color:var(--accent)">Restaurar</button>
  <button class="filter-btn" id="clear-btn" style="border-color:#ff4444; color:#ff4444">Limpar tudo</button>
  <input type="file" id="restore-file" accept=".json" style="display:none">
</div>

<div id="controls-repeats" class="controls" style="display:none">
  <input class="search-box" type="text" placeholder="Buscar pais..." id="search-repeat-input">
  <button class="filter-btn active" data-rfilter="all">Todos</button>
  <button class="filter-btn" data-rfilter="with">Com repetidas</button>
  <button class="filter-btn" id="copy-list-btn" style="margin-left:auto; background:#1a1a2e; border-color:var(--repeat-color); color:var(--repeat-color)">Copiar lista</button>
  <button class="filter-btn" id="clear-repeats-btn" style="border-color:#ff4444; color:#ff4444">Limpar repetidas</button>
</div>

<div class="content">
  <div id="tab-album" class="tab-content active">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Tenho</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--missing); border:1.5px solid #444"></div> Falta</div>
    </div>
    <div id="groups-container" class="groups-grid"></div>
  </div>
  <div id="tab-repeats" class="tab-content">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--repeat-color)"></div> Tem repetida</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--missing); border:1.5px solid #444"></div> Sem repetida</div>
      <div class="legend-item" style="color:var(--muted); font-size:0.7rem">Clique + / - para contar quantas copias tem</div>
    </div>
    <div id="repeats-container" class="groups-grid"></div>
  </div>
</div>

<script>
var SPECIAL_SECTIONS = [
  { id: "intro", label: "Introducao", stickers: ["00"] },
  { id: "fwc",   label: "FWC - Historia da Copa", stickers: ["FWC1","FWC2","FWC3","FWC4","FWC5","FWC6","FWC7","FWC8","FWC9","FWC10","FWC11","FWC12","FWC13","FWC14","FWC15","FWC16","FWC17","FWC18","FWC19"] },
  { id: "cc",    label: "Coca-Cola", stickers: ["CC1","CC2","CC3","CC4","CC5","CC6","CC7","CC8","CC9","CC10","CC11","CC12","CC13","CC14"] }
];

var REAL_GROUPS = {
  "A": ["Mexico","Africa do Sul","Coreia do Sul","Republica Tcheca"],
  "B": ["Canada","Bosnia e Herzegovina","Catar","Suica"],
  "C": ["Brasil","Marrocos","Haiti","Escocia"],
  "D": ["EUA","Paraguai","Australia","Turquia"],
  "E": ["Alemanha","Curacao","Costa do Marfim","Equador"],
  "F": ["Holanda","Japao","Tunisia","Suecia"],
  "G": ["Belgica","Egito","Ira","Nova Zelandia"],
  "H": ["Espanha","Cabo Verde","Arabia Saudita","Uruguai"],
  "I": ["Franca","Senegal","Noruega","Iraque"],
  "J": ["Argentina","Algeria","Austria","Jordania"],
  "K": ["Portugal","Uzbequistao","Colombia","Congo DR"],
  "L": ["Inglaterra","Croatia","Gana","Panama"]
};

var FLAGS = {
  "Mexico":"\uD83C\uDDF2\uD83C\uDDFD","Africa do Sul":"\uD83C\uDDFF\uD83C\uDDE6","Coreia do Sul":"\uD83C\uDDF0\uD83C\uDDF7","Republica Tcheca":"\uD83C\uDDE8\uD83C\uDDFF",
  "Canada":"\uD83C\uDDE8\uD83C\uDDE6","Bosnia e Herzegovina":"\uD83C\uDDE7\uD83C\uDDE6","Catar":"\uD83C\uDDF6\uD83C\uDDE6","Suica":"\uD83C\uDDE8\uD83C\uDDED",
  "Brasil":"\uD83C\uDDE7\uD83C\uDDF7","Marrocos":"\uD83C\uDDF2\uD83C\uDDE6","Haiti":"\uD83C\uDDED\uD83C\uDDF9","Escocia":"\uD83C\uDFF4",
  "EUA":"\uD83C\uDDFA\uD83C\uDDF8","Paraguai":"\uD83C\uDDF5\uD83C\uDDFE","Australia":"\uD83C\uDDE6\uD83C\uDDFA","Turquia":"\uD83C\uDDF9\uD83C\uDDF7",
  "Alemanha":"\uD83C\uDDE9\uD83C\uDDEA","Curacao":"\uD83C\uDDE8\uD83C\uDDFC","Costa do Marfim":"\uD83C\uDDE8\uD83C\uDDEE","Equador":"\uD83C\uDDEA\uD83C\uDDE8",
  "Holanda":"\uD83C\uDDF3\uD83C\uDDF1","Japao":"\uD83C\uDDEF\uD83C\uDDF5","Tunisia":"\uD83C\uDDF9\uD83C\uDDF3","Suecia":"\uD83C\uDDF8\uD83C\uDDEA",
  "Belgica":"\uD83C\uDDE7\uD83C\uDDEA","Egito":"\uD83C\uDDEA\uD83C\uDDEC","Ira":"\uD83C\uDDEE\uD83C\uDDF7","Nova Zelandia":"\uD83C\uDDF3\uD83C\uDDFF",
  "Espanha":"\uD83C\uDDEA\uD83C\uDDF8","Cabo Verde":"\uD83C\uDDE8\uD83C\uDDFB","Arabia Saudita":"\uD83C\uDDF8\uD83C\uDDE6","Uruguai":"\uD83C\uDDFA\uD83C\uDDFE",
  "Franca":"\uD83C\uDDEB\uD83C\uDDF7","Senegal":"\uD83C\uDDF8\uD83C\uDDF3","Noruega":"\uD83C\uDDF3\uD83C\uDDF4","Iraque":"\uD83C\uDDEE\uD83C\uDDF6",
  "Argentina":"\uD83C\uDDE6\uD83C\uDDF7","Algeria":"\uD83C\uDDE9\uD83C\uDDFF","Austria":"\uD83C\uDDE6\uD83C\uDDF9","Jordania":"\uD83C\uDDEF\uD83C\uDDF4",
  "Portugal":"\uD83C\uDDF5\uD83C\uDDF9","Uzbequistao":"\uD83C\uDDFA\uD83C\uDDFF","Colombia":"\uD83C\uDDE8\uD83C\uDDF4","Congo DR":"\uD83C\uDDE8\uD83C\uDDE9",
  "Inglaterra":"\uD83C\uDFF4","Croatia":"\uD83C\uDDED\uD83C\uDDF7","Gana":"\uD83C\uDDEC\uD83C\uDDED","Panama":"\uD83C\uDDF5\uD83C\uDDE6"
};

var state = {};
var repeats = {};

function loadState() {
  try {
    var s = localStorage.getItem('album_copa_2026');
    if (s) state = JSON.parse(s);
    var r = localStorage.getItem('repeats_copa_2026');
    if (r) repeats = JSON.parse(r);
  } catch(e) {}
}

function saveState() {
  localStorage.setItem('album_copa_2026', JSON.stringify(state));
  localStorage.setItem('repeats_copa_2026', JSON.stringify(repeats));
}

function getAlbum(key, len) {
  if (!state[key]) state[key] = new Array(len).fill(false);
  while (state[key].length < len) state[key].push(false);
  return state[key];
}

function getRepeats(key, len) {
  if (!repeats[key]) repeats[key] = new Array(len).fill(0);
  while (repeats[key].length < len) repeats[key].push(0);
  return repeats[key];
}

function countHave(key, len) {
  return getAlbum(key, len).filter(Boolean).length;
}

function countRepeatTotal(key, len) {
  return getRepeats(key, len).reduce(function(a,b){ return a+b; }, 0);
}

var currentFilter = 'all';
var currentRFilter = 'all';
var searchText = '';
var searchRepeatText = '';
var currentTab = 'album';

function allSections() {
  var out = [];
  SPECIAL_SECTIONS.forEach(function(sec) {
    out.push({ key: '__'+sec.id, len: sec.stickers.length });
  });
  Object.values(REAL_GROUPS).flat().forEach(function(c) {
    out.push({ key: c, len: 20 });
  });
  return out;
}

function updateGlobalStats() {
  var totalHave = 0, totalAll = 0, countriesDone = 0, totalRep = 0;
  allSections().forEach(function(sec) {
    var h = countHave(sec.key, sec.len);
    totalHave += h;
    totalAll += sec.len;
    if (sec.len === 20 && sec.key.indexOf('__') !== 0 && h === 20) countriesDone++;
    totalRep += countRepeatTotal(sec.key, sec.len);
  });
  var pct = Math.round((totalHave / totalAll) * 100);
  document.getElementById('total-have').textContent = totalHave;
  document.getElementById('total-missing').textContent = totalAll - totalHave;
  document.getElementById('total-pct').textContent = pct + '%';
  document.getElementById('countries-done').textContent = countriesDone;
  document.getElementById('global-bar').style.width = pct + '%';
  document.getElementById('total-repeats').textContent = totalRep;
  document.getElementById('rep-total-badge').textContent = totalRep > 0 ? totalRep : '';
}

function renderAll() {
  updateGlobalStats();
  if (currentTab === 'album') renderAlbumTab();
  else renderRepeatsTab();
}

function passFilter(key, len) {
  var h = countHave(key, len);
  if (currentFilter === 'complete') return h === len;
  if (currentFilter === 'incomplete') return h < len;
  if (currentFilter === 'started') return h > 0 && h < len;
  return true;
}

function renderAlbumTab() {
  var container = document.getElementById('groups-container');
  container.innerHTML = '';

  var specialDiv = document.createElement('div');
  specialDiv.innerHTML = '<div class="group-header"><span>FIGURINHAS ESPECIAIS</span></div>';
  var specGrid = document.createElement('div');
  specGrid.className = 'countries-grid';
  SPECIAL_SECTIONS.forEach(function(sec) {
    var key = '__'+sec.id;
    var len = sec.stickers.length;
    if (!passFilter(key, len)) return;
    if (searchText && sec.label.toLowerCase().indexOf(searchText) === -1) return;
    specGrid.appendChild(buildAlbumCard(key, len, sec.label, '', sec.stickers));
  });
  if (specGrid.children.length) { specialDiv.appendChild(specGrid); container.appendChild(specialDiv); }

  Object.keys(REAL_GROUPS).forEach(function(grp) {
    var countries = REAL_GROUPS[grp];
    var filtered = countries.filter(function(c) {
      if (searchText && c.toLowerCase().indexOf(searchText) === -1) return false;
      return passFilter(c, 20);
    });
    if (!filtered.length) return;
    var grpHave = countries.reduce(function(s,c){ return s + countHave(c, 20); }, 0);
    var grpDiv = document.createElement('div');
    grpDiv.innerHTML = '<div class="group-header"><span>GRUPO ' + grp + '</span><span class="group-progress-text">' + grpHave + '/' + (countries.length*20) + '</span></div>';
    var grid = document.createElement('div');
    grid.className = 'countries-grid';
    filtered.forEach(function(c) { grid.appendChild(buildAlbumCard(c, 20, c, FLAGS[c]||'', null)); });
    grpDiv.appendChild(grid);
    container.appendChild(grpDiv);
  });
}

function buildAlbumCard(key, len, label, flag, customLabels) {
  var s = getAlbum(key, len);
  var have = s.filter(Boolean).length;
  var isComplete = have === len;
  var pct = Math.round((have/len)*100);
  var card = document.createElement('div');
  card.className = 'country-card' + (isComplete ? ' complete' : '');

  var flagHtml = flag ? '<span class="flag">' + flag + '</span>' : '';
  var completeHtml = isComplete ? '<span style="color:var(--accent);font-size:0.75rem">&#x2713;</span>' : '';
  var safeKey = key.replace(/[^a-zA-Z0-9]/g,'_');

  card.innerHTML =
    '<div class="country-header">' +
      '<div class="country-name">' + flagHtml + '<span>' + label + '</span>' + completeHtml + '</div>' +
      '<div class="country-count ' + (isComplete?'full':'') + '">' + have + '/' + len + '</div>' +
    '</div>' +
    '<div class="country-bar"><div class="country-bar-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="stickers-grid" id="ag-' + safeKey + '"></div>' +
    '<div class="sticker-labels" id="al-' + safeKey + '"></div>';

  var grid = card.querySelector('#ag-' + safeKey);
  var labsDiv = card.querySelector('#al-' + safeKey);

  s.forEach(function(have_it, idx) {
    var lbl = customLabels ? customLabels[idx] : String(idx+1);
    var el = document.createElement('div');
    el.className = 'sticker' + (have_it ? ' have' : '');
    el.textContent = lbl;
    el.style.fontSize = customLabels ? '0.45rem' : '0.55rem';
    el.addEventListener('click', function() {
      getAlbum(key, len)[idx] = !getAlbum(key, len)[idx];
      saveState(); renderAll();
    });
    grid.appendChild(el);
    var l = document.createElement('div');
    l.className = 'sticker-label';
    l.textContent = lbl;
    labsDiv.appendChild(l);
  });
  return card;
}

function renderRepeatsTab() {
  var container = document.getElementById('repeats-container');
  container.innerHTML = '';

  var specialDiv = document.createElement('div');
  specialDiv.innerHTML = '<div class="group-header"><span>FIGURINHAS ESPECIAIS</span></div>';
  var specGrid = document.createElement('div');
  specGrid.className = 'countries-grid';
  SPECIAL_SECTIONS.forEach(function(sec) {
    var key = '__'+sec.id;
    var len = sec.stickers.length;
    if (searchRepeatText && sec.label.toLowerCase().indexOf(searchRepeatText) === -1) return;
    var total = countRepeatTotal(key, len);
    if (currentRFilter === 'with' && total === 0) return;
    specGrid.appendChild(buildRepeatCard(key, len, sec.label, '', sec.stickers));
  });
  if (specGrid.children.length) { specialDiv.appendChild(specGrid); container.appendChild(specialDiv); }

  Object.keys(REAL_GROUPS).forEach(function(grp) {
    var countries = REAL_GROUPS[grp];
    var filtered = countries.filter(function(c) {
      if (searchRepeatText && c.toLowerCase().indexOf(searchRepeatText) === -1) return false;
      if (currentRFilter === 'with' && countRepeatTotal(c, 20) === 0) return false;
      return true;
    });
    if (!filtered.length) return;
    var grpRep = countries.reduce(function(s,c){ return s + countRepeatTotal(c, 20); }, 0);
    var grpDiv = document.createElement('div');
    grpDiv.innerHTML = '<div class="group-header"><span>GRUPO ' + grp + '</span><span class="group-progress-text" style="color:var(--repeat-color)">' + (grpRep > 0 ? grpRep+' repetidas' : '') + '</span></div>';
    var grid = document.createElement('div');
    grid.className = 'countries-grid';
    filtered.forEach(function(c) { grid.appendChild(buildRepeatCard(c, 20, c, FLAGS[c]||'', null)); });
    grpDiv.appendChild(grid);
    container.appendChild(grpDiv);
  });
}

function buildRepeatCard(key, len, label, flag, customLabels) {
  var r = getRepeats(key, len);
  var total = r.reduce(function(a,b){ return a+b; }, 0);
  var hasAny = total > 0;
  var safeKey = key.replace(/[^a-zA-Z0-9]/g,'_');
  var flagHtml = flag ? '<span class="flag">' + flag + '</span>' : '';

  var card = document.createElement('div');
  card.className = 'country-card' + (hasAny ? ' has-repeats' : '');
  card.innerHTML =
    '<div class="country-header">' +
      '<div class="country-name">' + flagHtml + '<span>' + label + '</span></div>' +
      '<div class="country-count ' + (hasAny?'has-r':'') + '">' + (hasAny ? total+' rep.' : '-') + '</div>' +
    '</div>' +
    '<div class="country-bar"><div class="country-bar-fill repeat" style="width:' + Math.min(100, total*10) + '%"></div></div>' +
    '<div class="stickers-grid" id="rg-' + safeKey + '"></div>' +
    '<div class="sticker-labels" id="rl-' + safeKey + '"></div>' +
    '<div class="repeat-summary" id="rs-' + safeKey + '"></div>';

  var grid = card.querySelector('#rg-' + safeKey);
  var labsDiv = card.querySelector('#rl-' + safeKey);
  var summary = card.querySelector('#rs-' + safeKey);

  r.forEach(function(count, idx) {
    var lbl = customLabels ? customLabels[idx] : String(idx+1);
    var el = document.createElement('div');
    el.className = 'sticker' + (count > 0 ? ' has-repeat' : '');
    el.style.fontSize = customLabels ? '0.4rem' : '0.5rem';

    if (count > 0) {
      el.innerHTML =
        '<div class="repeat-controls">' +
          '<button class="rep-btn" data-action="plus" data-key="' + key + '" data-idx="' + idx + '">+</button>' +
          '<span class="rep-count">' + count + '</span>' +
          '<button class="rep-btn" data-action="minus" data-key="' + key + '" data-idx="' + idx + '">-</button>' +
        '</div>';
    } else {
      el.textContent = lbl;
      (function(k, i) {
        el.addEventListener('click', function() {
          getRepeats(k, len)[i]++;
          saveState(); renderAll();
        });
      })(key, idx);
    }
    grid.appendChild(el);

    var l = document.createElement('div');
    l.className = 'sticker-label';
    l.textContent = lbl;
    labsDiv.appendChild(l);
  });

  grid.querySelectorAll('.rep-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var k = btn.dataset.key;
      var i = parseInt(btn.dataset.idx);
      var arr = getRepeats(k, len);
      if (btn.dataset.action === 'plus') arr[i]++;
      else arr[i] = Math.max(0, arr[i]-1);
      saveState(); renderAll();
    });
  });

  r.forEach(function(count, idx) {
    if (count > 0) {
      var lbl = customLabels ? customLabels[idx] : String(idx+1);
      var tag = document.createElement('div');
      tag.className = 'rep-tag';
      tag.textContent = label.split('/')[0].trim() + ' ' + lbl + ' x' + count;
      summary.appendChild(tag);
    }
  });

  return card;
}

document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    document.getElementById('controls-album').style.display = currentTab === 'album' ? 'flex' : 'none';
    document.getElementById('controls-repeats').style.display = currentTab === 'repeats' ? 'flex' : 'none';
    document.getElementById('tab-album').classList.toggle('active', currentTab === 'album');
    document.getElementById('tab-repeats').classList.toggle('active', currentTab === 'repeats');
    renderAll();
  });
});

document.querySelectorAll('.filter-btn[data-filter]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn[data-filter]').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderAll();
  });
});

document.getElementById('search-input').addEventListener('input', function(e) {
  searchText = e.target.value.toLowerCase();
  renderAll();
});

document.getElementById('clear-btn').addEventListener('click', function() {
  if (confirm('Apagar todo o progresso do album?')) {
    state = {}; saveState(); renderAll();
  }
});

document.querySelectorAll('.filter-btn[data-rfilter]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn[data-rfilter]').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    currentRFilter = btn.dataset.rfilter;
    renderAll();
  });
});

document.getElementById('search-repeat-input').addEventListener('input', function(e) {
  searchRepeatText = e.target.value.toLowerCase();
  renderAll();
});

document.getElementById('clear-repeats-btn').addEventListener('click', function() {
  if (confirm('Apagar todas as repetidas?')) {
    repeats = {}; saveState(); renderAll();
  }
});

document.getElementById('copy-list-btn').addEventListener('click', function() {
  var lines = [];
  SPECIAL_SECTIONS.forEach(function(sec) {
    var key = '__' + sec.id;
    var r = getRepeats(key, sec.stickers.length);
    r.forEach(function(count, idx) {
      if (count > 0) lines.push(sec.stickers[idx] + ' x' + count);
    });
  });
  Object.values(REAL_GROUPS).flat().forEach(function(country) {
    var r = getRepeats(country, 20);
    r.forEach(function(count, idx) {
      if (count > 0) lines.push(country + ' ' + (idx+1) + ' x' + count);
    });
  });
  if (lines.length === 0) { alert('Voce nao tem nenhuma repetida registrada ainda!'); return; }
  var total = lines.reduce(function(s,l){ var m = l.match(/x(\d+)/); return s + (m ? parseInt(m[1]) : 0); }, 0);
  var text = 'Minhas figurinhas repetidas (' + total + ' no total):\n\n' + lines.join('\n');
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('copy-list-btn');
    var orig = btn.textContent;
    btn.textContent = 'Copiado!';
    setTimeout(function(){ btn.textContent = orig; }, 2000);
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var btn = document.getElementById('copy-list-btn');
    var orig = btn.textContent;
    btn.textContent = 'Copiado!';
    setTimeout(function(){ btn.textContent = orig; }, 2000);
  });
});

document.getElementById('backup-btn').addEventListener('click', function() {
  var data = { version: 1, date: new Date().toISOString(), album: state, repeats: repeats };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'album-copa-2026-backup.json';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('restore-btn').addEventListener('click', function() {
  document.getElementById('restore-file').click();
});

document.getElementById('restore-file').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      if (!data.album) throw new Error('invalido');
      var dateStr = data.date ? new Date(data.date).toLocaleDateString('pt-BR') : 'data desconhecida';
      if (confirm('Restaurar backup de ' + dateStr + '? Isso vai substituir seus dados atuais.')) {
        state = data.album || {};
        repeats = data.repeats || {};
        saveState();
        renderAll();
        alert('Backup restaurado com sucesso!');
      }
    } catch(err) {
      alert('Arquivo invalido.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

loadState();
renderAll();
</script>
